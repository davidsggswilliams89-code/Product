<!DOCTYPE html>
<html>
<head>
  <title>BOB TEXTILE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://widget.cloudinary.com/v2.0/global/all.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f5f5f5;
  padding-top:80px;
}

/* HEADER */
.top-marquee{
  background:#111;
  color:white;
  position:fixed;
  top:0;
  width:100%;
  height:45px;
  display:flex;
  align-items:center;
  z-index:3000;
  overflow:hidden;
}

.logo{
  height:34px;
  padding-left:8px;
  border-radius:6px;
  background:#111;
  z-index:5;
}

.marquee-wrapper{
  position:absolute;
  width:100%;
  overflow:hidden;
}

.marquee-text{
  white-space:nowrap;
  animation:move 12s linear infinite;
  margin-left:120px;
}

@keyframes move{
  0%{transform:translateX(100%);}
  100%{transform:translateX(-100%);}
}

.admin-icon{
  position:absolute;
  right:0;
  top:0;
  height:45px;
  width:45px;
  background:#222;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

/* CATEGORY */
.category-bar{
  position:fixed;
  top:45px;
  width:100%;
  height:40px;
  background:#222;
  display:flex;
  align-items:center;
  overflow-x:auto;
}

.category-btn{
  color:white;
  padding:0 14px;
  white-space:nowrap;
  cursor:pointer;
}

.category-btn.active{
  background:#25D366;
  border-radius:5px;
  font-weight:bold;
}

.view{display:none;padding:10px;}
.active-view{display:block;}

/* PRODUCT CARD */
.card{
  width:100%;
  max-width:380px;
  margin:auto;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 3px 15px rgba(0,0,0,0.18);
  padding-top:10px;
  margin-bottom:20px;
}

/* CAROUSEL */
.carousel{
  display:flex;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
}

.carousel img{
  min-width:100%;
  height:420px;
  object-fit:contain;
  background:#fff;
  scroll-snap-align:center;
}

.carousel::-webkit-scrollbar{
  display:none;
}

/* DOTS */
.dots{
  text-align:center;
  margin-top:8px;
}

.dot{
  height:8px;
  width:8px;
  margin:0 4px;
  background:#bbb;
  border-radius:50%;
  display:inline-block;
}

.dot.active{
  background:#000;
  transform:scale(1.3);
}

/* BADGE */
.new-badge{
  position:absolute;
  top:15px;
  left:15px;
  background:red;
  color:white;
  font-size:11px;
  padding:4px 6px;
  border-radius:5px;
  z-index:5;
}

/* CONTENT */
.content{
  padding:18px;
  text-align:center;
}

.price{
  color:green;
  font-weight:bold;
  margin-bottom:14px;
  font-size:20px;
}

.buy-btn{
  width:100%;
  background:#25D366;
  color:#fff;
  border:none;
  padding:14px;
  border-radius:8px;
  cursor:pointer;
  font-size:15px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
}

.buy-btn img{width:20px;}

/* ADMIN */
.admin{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  z-index:5000;
  padding:15px;
  overflow-y:auto;
}

input,select{
  width:100%;
  padding:12px;
  margin:6px 0;
  border:1px solid #ddd;
  border-radius:8px;
}

.btn{
  background:green;
  color:white;
  border:none;
  width:100%;
  padding:12px;
  border-radius:8px;
  margin-top:10px;
}

.admin-item{
  display:flex;
  gap:10px;
  align-items:center;
  background:#f2f2f2;
  padding:8px;
  border-radius:6px;
  margin:5px 0;
}
</style>
</head>

<body>

<div class="top-marquee">
<img src="logo.jpeg" class="logo">
<div class="marquee-wrapper">
<div class="marquee-text">✨ BOB TEXTILE ✨ Premium Fashion Store ✨</div>
</div>
<div class="admin-icon" onclick="openAdmin()">🔒</div>
</div>

<div class="category-bar">
<div class="category-btn" onclick="showView('about',this)">ABOUT US</div>
<div class="category-btn" onclick="showView('kaftan',this)">KAFTAN</div>
<div class="category-btn" onclick="showView('lace',this)">LACE</div>
<div class="category-btn" onclick="showView('bags',this)">BAGS</div>
<div class="category-btn" onclick="showView('shoes',this)">SHOES</div>
<div class="category-btn" onclick="showView('abayas',this)">ABAYAS</div>
<div class="category-btn" onclick="showView('yard',this)">YARD</div>
<div class="category-btn" onclick="showView('caps',this)">CAPS</div>
</div>

<div id="aboutView" class="view active-view"><h3>BOB TEXTILE</h3></div>
<div id="kaftanView" class="view"></div>
<div id="laceView" class="view"></div>
<div id="bagsView" class="view"></div>
<div id="shoesView" class="view"></div>
<div id="abayasView" class="view"></div>
<div id="yardView" class="view"></div>
<div id="capsView" class="view"></div>

<div class="admin" id="adminPanel">
<h3>Admin Panel</h3>
<input id="aName" placeholder="Product Name">
<input id="aPrice" placeholder="Price">
<select id="aCategory">
<option value="kaftan">Kaftan</option>
<option value="lace">Lace</option>
<option value="bags">Bags</option>
<option value="shoes">Shoes</option>
<option value="abayas">Abayas</option>
<option value="yard">Yard</option>
<option value="caps">Caps</option>
</select>

<button class="btn" onclick="uploadImage()">Upload Images</button>
<div id="previewBox"></div>

<button class="btn" onclick="addProduct()">Save Product</button>
<hr>
<div id="adminList"></div>
<button class="btn" style="background:red" onclick="closeAdmin()">Close</button>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];
let uploadedImages = [];

function showView(type,el){
document.querySelectorAll(".view").forEach(v=>v.classList.remove("active-view"));
document.querySelectorAll(".category-btn").forEach(b=>b.classList.remove("active"));
el.classList.add("active");

let list = products.filter(p => p.category === type);
let html='';

list.forEach((p,i)=>{

let imagesHTML='';
p.images.forEach(img=>{
imagesHTML += `<img src="${img}">`;
});

html+=`
<div class="card">

<div style="position:relative;">
${(Date.now()-p.date<86400000)?'<div class="new-badge">NEW</div>':''}

<div class="carousel car${i}">
${imagesHTML}
</div>
</div>

<div class="dots dots${i}"></div>

<div class="content">
<div class="price">₦ ${p.price}</div>

<button class="buy-btn"
onclick="buyNow('${p.name}','${p.price}','${p.images[0]}')">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
WhatsApp Order
</button>
</div>

</div>`;
});

document.getElementById(type+"View").innerHTML=html;
document.getElementById(type+"View").classList.add("active-view");

/* INIT CAROUSEL */
list.forEach((_,i)=>{
setupCarousel(".car"+i,".dots"+i);
});
}

function setupCarousel(car,dotsC){
let carousel=document.querySelector(car);
let dotsBox=document.querySelector(dotsC);
if(!carousel)return;

let imgs=carousel.querySelectorAll("img");

imgs.forEach((_,i)=>{
let d=document.createElement("span");
d.classList.add("dot");
if(i===0)d.classList.add("active");
dotsBox.appendChild(d);
});

let dots=dotsBox.querySelectorAll(".dot");

carousel.addEventListener("scroll",()=>{
let index=Math.round(carousel.scrollLeft/carousel.clientWidth);
dots.forEach(d=>d.classList.remove("active"));
if(dots[index])dots[index].classList.add("active");
});
}

function buyNow(name,price,img){
let msg=`Hello, I want to order:\n${name}\n₦${price}\n${img}`;
window.open("https://wa.me/2349114738932?text="+encodeURIComponent(msg));
}

/* ADMIN */
function openAdmin(){
if(prompt("Password")==="1234"){
adminPanel.style.display="block";
loadAdmin();
}
}

function closeAdmin(){adminPanel.style.display="none";}

function uploadImage(){
cloudinary.openUploadWidget({
cloudName:"db92r6j9z",
uploadPreset:"ummuhalti",
multiple:true
},(e,r)=>{
if(r && r.event==="success"){
uploadedImages.push(r.info.secure_url);
renderPreview();
}
});
}

function renderPreview(){
previewBox.innerHTML="";
uploadedImages.forEach(i=>{
previewBox.innerHTML+=`<img src="${i}" width="60">`;
});
}

function addProduct(){
products.unshift({
name:aName.value,
price:aPrice.value,
category:aCategory.value,
images:[...uploadedImages],
date:Date.now()
});

localStorage.setItem("products",JSON.stringify(products));
uploadedImages=[];
renderPreview();
loadAdmin();
}

function loadAdmin(){
adminList.innerHTML="";
products.forEach((p,i)=>{
adminList.innerHTML+=`
<div class="admin-item">
<img src="${p.images[0]}" width="50">
<div style="flex:1">${p.name}</div>
<button onclick="deleteProduct(${i})">Delete</button>
</div>`;
});
}

function deleteProduct(i){
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
loadAdmin();
}
</script>

</body>
</html>
